<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mester Prompter - Pro Edition</title>
    <!-- Modern Betűtípusok az olvashatósághoz -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="prompter.css">
</head>
<body class="theme-dark">

    <!-- Fókusz Zóna Segédvonal (50% fentről) -->
    <div class="focus-guide" id="focus-guide" style="top: 50%;">
        <div class="guide-line"></div>
    </div>

    <!-- Fő Prompter Viewport -->
    <div id="prompter-viewport" class="prompter-viewport">
        <!-- A szöveg renderelésének helye -->
        <div id="prompter-content" class="prompter-content text-sizing">
            Valós idejű vajpuha görgető és rendering motor.<br/><br/>
            Nyisd meg a jobb felső "Beállítások" panelt a szkript betöltéséhez!
        </div>
    </div>

    <!-- Fő Vezérlő Panel -->
    <button id="mobile-toggle" class="mobile-toggle" title="Beállítások">⚙️</button>
    <div id="settings-panel" class="settings-panel collapsed">
        <div class="panel-header">
            <h3>Mester Prompter Beállítások</h3>
            <span class="toggle-icon"></span>
        </div>
        
        <div class="panel-body">
            
            <div class="control-group">
                <label>Szkript betöltése</label>
                <textarea id="script-input" rows="4">Ez az utolsó, negyedik mérföldkő! Itt kipróbálhatod a "Vajpuha" görgető motort, ami lineáris interpolációt használ, úgynevezett LERP technikát a tökéletesen sima mozgásért. Még akkor is kalkulál és tolja előre a szöveget a fókusz zónában, ha épp csönd van, hogy a tempó sose akadjon meg. A prediktív technológia teszi igazán profivá ezt a fejlesztést.</textarea>
                <button id="btn-load" class="action-btn play-btn" style="width:100%; border-radius:12px; background: var(--accent-blue); color: white;">Szkript Előkészítése</button>
            </div>

            <div class="control-group">
                <label>Betűméret: <span id="val-fs">72</span>px</label>
                <input type="range" id="set-fs" min="40" max="150" value="72">
            </div>

            <div class="control-group">
                <label>Sormagasság: <span id="val-lh">1.5</span></label>
                <input type="range" id="set-lh" min="1.0" max="2.5" step="0.1" value="1.5">
            </div>

            <div class="control-group">
                <label>Oldalsó Margó: <span id="val-pad">100</span>px</label>
                <input type="range" id="set-pad" min="0" max="400" value="100">
            </div>
            
            <div class="control-group">
                <label>Fókusz Vonal (Anchor): <span id="val-anch">50</span>%</label>
                <input type="range" id="set-anch" min="10" max="90" value="50">
            </div>

            <div class="control-group" style="display:flex; flex-direction:column; gap:12px; margin-top:24px;">
                <label style="display:flex; align-items:center; gap:10px; text-transform:none; cursor:pointer;">
                    <input type="checkbox" id="set-mirror"> Tükrözés (Mirror Mode)
                </label>
                <label style="display:flex; align-items:center; gap:10px; text-transform:none; cursor:pointer;">
                    <input type="checkbox" id="set-guide" checked> Fókusz Vonal Mutatása
                </label>
                <label style="display:flex; align-items:center; gap:10px; text-transform:none; cursor:pointer;">
                    <input type="checkbox" id="set-highlight" checked> Szó Kijelölés Mutatása
                </label>
            </div>

        </div>
        <div class="panel-body" style="padding-top:0;">
            <div style="font-size: 11px; color:#52525b; text-align:center;">
                <span id="sys-status">Készenlét</span> | <span id="sys-wpm">0 WPM</span>
            </div>
        </div>
    </div>

    <!-- Lebegő Irányítópult (Minden nézetben 1 kattintásra elérhető) -->
    <div class="bottom-controls">
        <button id="btn-restart" class="action-btn circle-btn" disabled title="Újrakezdés">⏮️</button>
        <button id="btn-start" class="action-btn play-btn" disabled>
            <span class="icon">▶</span>
            <span class="text">Indítás</span>
        </button>
    </div>

    <!-- Debug Sáv -->
    <div id="debug-bar">Várakozás...</div>

    <script src="tokenizer.js"></script>
    <script src="speechService.js"></script>
    <script src="trackingEngine.js"></script>
    <script src="prompterRenderer.js"></script>
    <script src="masterApp.js"></script>
</body>
</html>
